<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Feed{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    {% block head %}{% endblock %}
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --accent: {% block accent_color %}#38bdf8{% endblock %};
            --accent-dim: {% block accent_dim %}#0c4a6e{% endblock %};
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
        }

        html, body {
            height: 100%;
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        body { display: flex; flex-direction: column; }

        /* Nav */
        .feed-nav {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            font-size: 0.8125rem;
            flex-shrink: 0;
        }
        .feed-nav-brand {
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-size: 0.6875rem;
        }
        .feed-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.15s;
        }
        .feed-nav a:hover { color: var(--text-primary); }
        .feed-nav a.active { color: var(--accent); }

        /* Main content */
        .feed-main {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Panels */
        .feed-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
        }
        .feed-panel-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        /* Data display */
        .feed-stat {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--accent);
        }
        .feed-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Buttons */
        .feed-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.8125rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .feed-btn:hover {
            background: var(--border);
            border-color: var(--text-muted);
        }
        .feed-btn-accent {
            background: var(--accent-dim);
            border-color: var(--accent);
        }
        .feed-btn-accent:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        /* Slider */
        .feed-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            outline: none;
        }
        .feed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Loading */
        .feed-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        .feed-spinner {
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        {% block styles %}{% endblock %}
    </style>
</head>
<body>
    <nav class="feed-nav">
        <a href="/" class="feed-nav-brand">Feed</a>
        <a href="http://127.0.0.1:8000" {% block nav_aqi %}{% endblock %}>AQI Map</a>
        <a href="http://127.0.0.1:8001" {% block nav_energy %}{% endblock %}>Energy Grid</a>
        <a href="http://127.0.0.1:8002" {% block nav_flights %}{% endblock %}>Flights</a>
        <a href="http://127.0.0.1:8013" {% block nav_permits %}{% endblock %}>Permits</a>
        <a href="http://127.0.0.1:8014" {% block nav_legis %}{% endblock %}>Legis</a>
        <a href="http://127.0.0.1:8015" {% block nav_courts %}{% endblock %}>Courts</a>
    </nav>
    <main class="feed-main">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
